<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Cards Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="top-nav">
                <button id="resetBtn" class="secondary-btn">New Game</button>
                <button id="shareBtn" class="primary-btn">Share</button>
            </div>
            <div class="player-nav">
                <button id="addPlayerBtn">+ Add Player</button>
            </div>
        </header>

        <main class="table-area">
            <table id="scoreTable">
                <thead>
                    <tr id="playerNamesRow"></tr>
                </thead>
                <tbody id="roundsBody"></tbody>
            </table>
            <div class="row-trigger-zone">
                <button id="addRowBtn" class="fab-btn">+</button>
            </div>
        </main>
    </div>

    <div id="scoreOverlay" class="overlay-hidden" onclick="closeOverlay()">
        <div class="overlay-content" onclick="event.stopPropagation()">
            <div id="overlayOptions"></div>
            <button onclick="closeOverlay()" class="cancel-btn">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
