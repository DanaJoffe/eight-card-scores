<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Card Score Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header>
        <h1>Scoreboard</h1>
        <div class="controls">
            <button onclick="addPlayer()">+ Player</button>
            <button onclick="addRow()">+ Row</button>
            <button onclick="resetGame()" class="danger">Reset</button>
        </div>
    </header>

    <main id="table-container">
        <table id="scoreTable">
            <thead>
                <tr id="header-row">
                    </tr>
            </thead>
            <tbody id="score-body">
                </tbody>
        </table>
    </main>

    <script src="script.js"></script>
</body>
</html>
