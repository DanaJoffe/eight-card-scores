<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Cards Scoreboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="top-nav">
                <button id="resetBtn" class="secondary-btn">New Game</button>
                <div class="sum-badge">Bet Sum: <span id="betSum">0</span></div>
                <button id="shareBtn" class="primary-btn">Share</button>
            </div>
            <div class="player-nav">
                <button id="addPlayerBtn">+ Add Player</button>
                <div class="edit-hint">Long-tap past rounds to edit</div>
            </div>
        </header>

        <main class="table-area">
            <table id="scoreTable">
                <thead>
                    <tr id="playerNamesRow"></tr>
                </thead>
                <tbody id="roundsBody"></tbody>
            </table>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
